services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5059:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__MySQL=Server=mysql;Port=3306;Database=cmsorg;Uid=cmsorg;Pwd=cmsorg_pass;
      - ConnectionStrings__MongoDB=mongodb://cmsorg:cmsorg_pass@mongodb:27017/cmsorg?authSource=admin&authMechanism=SCRAM-SHA-256
      - Redis__Connection=redis:6379
    depends_on:
      mysql:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root_pass
      MYSQL_DATABASE: cmsorg
      MYSQL_USER: cmsorg
      MYSQL_PASSWORD: cmsorg_pass
    ports:
      - "33064:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "cmsorg", "-pcmsorg_pass"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7
    environment:
      MONGO_INITDB_ROOT_USERNAME: cmsorg
      MONGO_INITDB_ROOT_PASSWORD: cmsorg_pass
      MONGO_INITDB_DATABASE: cmsorg
    ports:
      - "27018:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    restart: always
    ports:
      - "6382:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
  mongo_data:
  redis_data:

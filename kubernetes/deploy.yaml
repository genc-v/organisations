apiVersion: apps/v1
kind: Deployment
metadata:
  name: cms-organisations
  namespace: cms
  labels:
    app: cms-organisations
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cms-organisations
  template:
    metadata:
      labels:
        app: cms-organisations
    spec:
      containers:
        - name: cms-organisations
          image: cmsorganisations:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: "Development"
            - name: ConnectionStrings__MySQL
              value: "Server=mysql-org;Port=3306;Database=cmsorg;Uid=cmsorg;Pwd=cmsorg_pass;"
            - name: ConnectionStrings__MongoDB
              value: "mongodb://cmsorg:cmsorg_pass@mongodb:27017/cmsorg?authSource=admin&authMechanism=SCRAM-SHA-256"
            - name: Redis__Connection
              value: "redis:6379"

---
apiVersion: v1
kind: Service
metadata:
  name: cms-organisations
  namespace: cms
spec:
  type: ClusterIP
  selector:
    app: cms-organisations
  ports:
    - port: 80
      targetPort: 8080
